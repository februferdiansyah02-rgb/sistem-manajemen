<!DOCTYPE html>
<html lang="en">

<body>

   <div class="container">

    <h1>KEUANGAN</h1>

    <div class="form-box">

        <input
            type="text"
            id="keterangan"
            placeholder="Keterangan Transaksi">

        <select id="jenis">
            <option value="pemasukan">Pemasukan</option>
            <option value="pengeluaran">Pengeluaran</option>
        </select>

        <input
            type="number"
            id="nominal"
            placeholder="Nominal">

        <input
            type="date"
            id="tanggal">

        <button onclick="tambahData()">
            Simpan Transaksi
        </button>

    </div>

    <div class="summary">

        <div class="card">
            <h3> Pemasukan</h3>
            <h2 id="totalMasuk">Rp 0</h2>
        </div>

        <div class="card">
            <h3> Pengeluaran</h3>
            <h2 id="totalKeluar">Rp 0</h2>
        </div>

        <div class="card">
            <h3> Saldo</h3>
            <h2 id="saldo">Rp 0</h2>
        </div>

    </div>

    <div class="transaksi">

        <h2>Riwayat Transaksi</h2>

        <div id="listTransaksi"></div>

    </div>

</div>
<script src="keuangan.js"></script>
</body>
</html>
